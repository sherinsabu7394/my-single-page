<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:400px;
    position:relative;
}

h1{
    margin-bottom:25px;
    color:#333;
}

.buttons{
    position:relative;
    height:120px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#yesBtn{
    background:#28a745;
    color:white;
}

#noBtn{
    background:#dc3545;
    color:white;
    position:absolute;
    left:220px;
    top:0;
}

#result{
    display:none;
    margin-top:20px;
}

#result img{
    width:250px;
    border-radius:12px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

    <h1>Will you be my girlfriend? ❤️</h1>

    <div class="buttons">
        <button id="yesBtn">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <div id="result">
        <h2>😂 Got You!</h2>
        <p>You actually clicked Yes!</p>

        <!-- Replace with your own meme image -->
        <img src="https://i.imgflip.com/4/1bij.jpg" alt="Funny Meme">
    </div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const result = document.getElementById("result");

noBtn.addEventListener("mouseenter", () => {

    const maxX = 250;
    const maxY = 80;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
});

yesBtn.addEventListener("click", () => {

    document.querySelector(".buttons").style.display = "none";

    result.style.display = "block";
});

</script>

</body>
</html>
